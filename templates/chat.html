<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>chat</title>
    <link rel="stylesheet" href="../static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main w-full h-dvh flex flex-col">

        <p style="display: none;" id="username">{{ username }}</p>
        <div class="header border border-gray-200 border-b p-2 h-16 flex items-center">
            <div class=" h-full items-center justify-center p-2 flex hover:bg-slate-200 rounded-full aspect-square" onclick="window.location.href = `/accounts/${document.getElementById('username').textContent}`">
                <i class="fas fa-angle-left text-xl"></i>
            </div>
            <h1 class="reciever text-3xl font-['Fredoka'] grow text-center">{{ reciever }}</h1>
        </div>
        <div class="content w-full grow flex justify-center overflow-hidden">
            <div class="messages w-10/12 h-full p-2 overflow-y-auto max-h-full flex flex-col">
                {% for message in messages %}
                {% if message[0] == username %}
                <div class="message bg-green-200 w-5/12 p-2 mb-2 rounded-xl self-end">
                    <p class="text-xl text-white">{{ message[2] }}</p>
                </div>
                {% else %}
                <div class="message bg-gray-200 w-5/12 p-2 mb-2 rounded-xl">
                    <p class="text-xl text-white">{{ message[2] }}</p>
                </div>
                {% endif %}
                {% endfor %}
            </div>
        </div>
        <div class="footer p-2 pt-4 border border-t border-gray-200 self-baseline flex gap-2 w-full">
            <div class="aspect-square h-full rounded-full p-2 hover:bg-slate-200 flex justify-center items-center"><i class="fas fa-add text-xl text-black"></i></div>
            <input type="text" name="text-box" class="text-box p-2 rounded-xl border-b border border-gray-200 grow">
            <div class="button aspect-video bg-green-300 h-full rounded-full p-2 hover:bg-green-200 flex justify-center items-center"><i class="fas fa-angle-right text-xl text-black"></i></div>
        </div>
    </div>
    <script src="../static/chat.js"></script>
</body>
</html>
