<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>create account</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../static/style.css">
    <style>
        
        .main{
            background: linear-gradient(45deg, #FC466B 0%, #3F5EFB 100%);
        }
        .form{
            backdrop-filter: blur(10px);
            border-top: 1px solid white;
            border-left: 1px solid white;
        }
        .input{
            background: rgba(255,255,255,0.3);
            width: 100%;
            height: 2rem;
            padding: 24px;
        
            border-radius: 0.5rem;
        }
        .input:hover{
            scale: 1.02;
        }
        h1{
            font-family: 'Inter';
        }
        button:hover{
            scale: 1.05
        }
    </style>
</head>
<body>
    <div class="main flex w-full h-dvh justify-center items-center">
        <div class="form bg-[rgba(255,255,255,0.3)] w-8/12 rounded-xl p-4 flex flex-col items-center">
            <h1 class="text-white text-5xl text-center font-['Inter'] font-black mb-2">welcome to this web app</h1>
            <h4 class="text-slate-200 text-center text-3xl font-['Fredoka'] font-medium">are you new to this? create account here</h4>
            <div class="flex flex-col w-10/12 mt-8 items-center gap-6">
                <input type="text" class="input" placeholder="Enter your username" name="username" id="username">
                <input class="input" type="text" name="password" id="password" placeholder="Enter your password">
                <button id="create" class="w-[50%] mt-1 p-2 text-black bg-zinc-100 border-0 rounded-xl hover:bg-zinc-200">create</button>
                <a href="/" class="text-yellow-300 text-xl font-[Inter] hover:text-yellow-400">already have an account? go to login page!!</a>
            </div>
        </div>
    </div>
    <script src="../static/create_account.js"></script>
</body>
</html>
